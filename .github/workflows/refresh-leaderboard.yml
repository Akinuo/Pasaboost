name: Refresh Leaderboard

# Runs every 30 minutes — GitHub's own minimum reliable cron granularity —
# and hits /api/refresh-leaderboard so rankings stay current even for
# students who never open their Profile page. Vercel's Hobby plan only
# allows daily cron jobs, which is why this lives in GitHub Actions instead.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {} # lets you trigger a refresh manually from the Actions tab

jobs:
  refresh-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Call refresh-leaderboard endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL repository secret is not set — add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

          http_status=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X GET "${APP_URL%/}/api/refresh-leaderboard" \
            -H "Authorization: Bearer ${CRON_SECRET}")

          echo "HTTP status: $http_status"
          cat /tmp/response.txt
          echo ""

          if [ "$http_status" -ge 400 ]; then
            echo "Leaderboard refresh failed."
            exit 1
          fi
